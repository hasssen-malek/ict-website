<script type="text/babel">
  const { useEffect } = React;

  function useScrollReveal() {
    useEffect(() => {
      const els = document.querySelectorAll(".reveal");
      if (!("IntersectionObserver" in window)) {
        els.forEach((el) => el.classList.add("is-in"));
        return;
      }
      const io = new IntersectionObserver(
        (entries) => {
          for (const e of entries) {
            if (e.isIntersecting) { e.target.classList.add("is-in"); io.unobserve(e.target); }
          }
        },
        { threshold: 0.12, rootMargin: "0px 0px -50px 0px" }
      );
      els.forEach((el) => io.observe(el));
      return () => io.disconnect();
    }, []);
  }

  /* TODO[VERIFY]: founding year and Microsoft designation count in FAQ answers */
  const FAQ_ITEMS = [
    { q: "What does ICT do?", a: "ICT is a digital transformation partner in Doha, Qatar. We help organisations modernise their infrastructure, secure it, and put their data and AI to work, across consulting, cloud and infrastructure, cybersecurity, data and AI, enterprise applications, customer experience, managed services, and emerging tech." },
    { q: "Where is ICT based?", a: "ICT is based in Doha, Qatar, and has worked across the country's most demanding sectors, including government, finance, and healthcare, since 2005." },
    { q: "What is ICT's relationship with Microsoft?", a: "ICT is a member of the Microsoft AI Cloud Partner Program, with five Solutions Partner designations and sixteen specializations across Azure, security, data and AI, and modern work." },
    { q: "Does ICT only run AI pilots, or production systems?", a: "We focus on AI that reaches production: governed, secure systems that run inside your business every day, built on a data foundation you can trust, rather than proofs of concept that stall after the pilot." },
  ];

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "#370FDD",
    "displayFont": "Space Grotesk",
    "ambientMotion": true
  }/*EDITMODE-END*/;

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    useScrollReveal();

    useEffect(() => {
      const root = document.documentElement;
      root.style.setProperty("--ict-core-indigo", t.accent);
      root.style.setProperty("--ed-display", `"${t.displayFont}", system-ui, sans-serif`);
      root.classList.toggle("motion-off", !t.ambientMotion);
    }, [t.accent, t.displayFont, t.ambientMotion]);

    return (
      <>
        <Nav />
        <main id="main-content" tabIndex="-1">
          <Hero />
          <HomeWhatWeDo />
          <HomePillars />
          <HomeAISpotlight />
          <HomeIndustries />
          <SuccessStories />
          <Partners />
          <WhyICT />
          <FaqBlock eyebrow="FAQ" title="Questions, answered." hl="answered" hue="blue" items={FAQ_ITEMS} bg="s-ink-deep" />
          <HomeInsights />
          <HomeContact />
        </main>
        <Footer />
        <TweaksPanel>
          <TweakSection label="Brand" />
          <TweakColor label="Accent" value={t.accent}
            options={["#370FDD", "#0098FF", "#612DF5", "#19C6D6"]}
            onChange={(v) => setTweak("accent", v)} />
          <TweakRadio label="Headline font" value={t.displayFont}
            options={["Space Grotesk", "Inter"]}
            onChange={(v) => setTweak("displayFont", v)} />
          <TweakSection label="Motion" />
          <TweakToggle label="Ambient motion" value={t.ambientMotion}
            onChange={(v) => setTweak("ambientMotion", v)} />
        </TweaksPanel>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
