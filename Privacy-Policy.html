<script type="text/babel">
  const { useEffect } = React;
  const LEGAL_DATA = {
    title: "Privacy policy",
    updated: "17 June 2026",
    intro: [
      "ICT (Information &amp; Communication Technology W.L.L) is a Qatar-based digital transformation and technology consultancy, headquartered in Doha. We design, deploy, secure, and operate the platforms that governments, enterprises, and critical-infrastructure organisations across Qatar depend on.",
      "Protecting personal data is part of how we earn the trust those organisations place in us. This policy explains what information we collect through this website and in the course of delivering our services, why we collect it, how we use and safeguard it, and the rights available to you. It is written to align with Law No. 13 of 2016 Concerning the Protection of Personal Data Privacy in the State of Qatar, and with the international standards our enterprise clients expect.",
      "By using this website or engaging ICT, you acknowledge the practices described in this policy."
    ],
    sections: [
      { h: "Data we collect", body: [
        "We collect only the information we need to respond to you, deliver our services, and operate this website securely. Depending on how you interact with us, this may include:",
        { ul: [
          "<strong>Personal information</strong>, your name, job title, and the organisation you represent.",
          "<strong>Contact details</strong>, business email address, telephone number, and postal or office address.",
          "<strong>Enquiry content</strong>, the information you choose to share in a contact form, consultation request, or email, including details of the project or challenge you describe.",
          "<strong>Technical information</strong>, IP address, browser type and version, device and operating system, and referring pages, collected automatically when you visit the site.",
          "<strong>Usage analytics</strong>, aggregated, anonymised information about how the site is used, such as pages viewed and time on page, collected only with your consent.",
          "<strong>Cookies</strong>, small files stored on your device, described in our <a href=\"Cookie-Policy.html\">Cookie Policy</a> and controlled through your cookie preferences."
        ] },
        "We do not knowingly collect special categories of personal data (such as health, religious, or biometric data) through this website, and we ask that you do not submit such information through our forms."
      ] },
      { h: "How we use information", body: [
        "We use the information we collect for clearly defined purposes:",
        { ul: [
          "<strong>Responding to enquiries</strong>, to reply to your questions, scope potential engagements, and arrange consultations.",
          "<strong>Delivering services</strong>, to provide, manage, and support the consulting, cloud, cybersecurity, data, AI, and managed services you engage us for.",
          "<strong>Marketing communications</strong>, where you have agreed, to send relevant updates about ICT services, insights, and events. You can withdraw consent at any time.",
          "<strong>Website improvement</strong>, to understand how the site performs and is used so we can make it faster, clearer, and more secure.",
          "<strong>Legal and security obligations</strong>, to protect our systems, prevent misuse, and meet our regulatory and contractual responsibilities."
        ] }
      ] },
      { h: "Legal basis for processing", body: [
        "We process personal data only where we have a lawful basis to do so. Depending on the context, that basis is one of the following:",
        { ul: [
          "<strong>Consent</strong>, for optional cookies, analytics, and marketing communications, which you may withdraw at any time.",
          "<strong>Performance of a contract</strong>, where processing is necessary to deliver services you or your organisation have engaged us for.",
          "<strong>Legitimate interests</strong>, to operate, secure, and improve our website and business, balanced against your rights and expectations.",
          "<strong>Legal obligation</strong>, where we are required to process data to comply with applicable laws in Qatar."
        ] }
      ] },
      { h: "How we share information", body: [
        "ICT does not sell personal data. We share it only where necessary and under appropriate safeguards, with:",
        { ul: [
          "<strong>Service providers and processors</strong>, trusted suppliers who host, secure, or support our systems, acting on our instructions and bound by confidentiality and data protection terms.",
          "<strong>Technology partners</strong>, where delivering an engagement requires it, and only to the extent needed, under contract.",
          "<strong>Authorities</strong>, where we are legally required to disclose information to regulators, courts, or government bodies in Qatar.",
          "<strong>Corporate transactions</strong>, in the event of a restructuring or transfer of part of our business, subject to continued protection of your data."
        ] }
      ] },
      { h: "International data transfers", body: [
        "Some of the platforms and providers we use to operate this website and deliver our services may process data outside the State of Qatar. Where personal data is transferred internationally, we put appropriate safeguards in place, including contractual protections and provider commitments, so that it continues to be protected to a standard consistent with Qatari law.",
        "For engagements with data sovereignty requirements, we design solutions to keep regulated data within Qatar or within the jurisdictions our clients specify."
      ] },
      { h: "Data security", body: [
        "We apply layered technical and organisational measures to protect personal data against unauthorised access, alteration, disclosure, or loss. These include encryption in transit, access controls, network and endpoint security, monitoring, and staff awareness, consistent with the security practices we deliver for our clients.",
        "No system can be guaranteed completely secure. If a personal data breach occurs that is likely to affect your rights, we will act promptly to contain it and will notify affected individuals and the relevant authority where required by law."
      ] },
      { h: "Data retention", body: [
        "We keep personal data only for as long as it is needed for the purpose it was collected, or as required to meet legal, regulatory, and contractual obligations. Enquiry and contact data is retained for the period necessary to manage our relationship with you; analytics data is retained in aggregated form according to the settings of the tools we use.",
        "When data is no longer required, we securely delete or anonymise it."
      ] },
      { h: "Your rights", body: [
        "Subject to applicable law, you have the right to:",
        { ul: [
          "Request access to the personal data we hold about you.",
          "Ask us to correct data that is inaccurate or incomplete.",
          "Request deletion of your data where there is no overriding legal reason to retain it.",
          "Object to, or ask us to restrict, certain processing.",
          "Withdraw consent for analytics, cookies, or marketing at any time, without affecting the lawfulness of earlier processing.",
          "Lodge a complaint with the competent supervisory authority in Qatar."
        ] },
        "To exercise any of these rights, contact us using the details below. We may need to verify your identity before acting on a request, and we will respond within the timeframes required by law."
      ] },
      { h: "Cookies", body: [
        "This website uses cookies and similar technologies. Strictly necessary cookies keep the site working and remember your preferences; optional analytics, marketing, and preference cookies are used only with your consent. You can review categories and change your choice at any time through our cookie preferences.",
        "Full details are set out in our <a href=\"Cookie-Policy.html\">Cookie Policy</a>."
      ] },
      { h: "Third-party services", body: [
        "Our website may use third-party services, for example analytics and content delivery, and may link to external sites such as those of our technology partners. These third parties are responsible for their own data practices. We encourage you to review their privacy notices, as this policy applies only to ICT."
      ] },
      { h: "Changes to this policy", body: [
        "We may update this policy from time to time to reflect changes in our practices, technology, or legal obligations. When we do, we will revise the date shown at the top of this page, and significant changes will be highlighted on the site. We encourage you to review this page periodically."
      ] },
      { h: "Contact information", body: [
        "If you have questions about this policy or wish to exercise your rights, please contact us:",
        { ul: [
          "ICT (Information &amp; Communication Technology W.L.L), Doha, State of Qatar",
          "Email: <a href=\"mailto:privacy@ict.com.qa\">privacy@ict.com.qa</a>",
          "Or through our <a href=\"Contact-Us.html\">contact page</a>."
        ] }
      ] }
    ]
  };
  function useScrollReveal(){ useEffect(()=>{ document.querySelectorAll('.reveal').forEach(el=>el.classList.add('is-in')); },[]); }
  function App(){ useScrollReveal();
    return (<><Nav /><main id="main-content" tabIndex="-1"><LegalPage data={LEGAL_DATA} /></main><Footer /></>); }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
