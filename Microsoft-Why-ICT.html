<script type="text/babel">
  const { useEffect } = React;
  const KEY = "whyict";
  function useScrollReveal(){ useEffect(()=>{ const els=document.querySelectorAll('.reveal'); if(!('IntersectionObserver' in window)){els.forEach(el=>el.classList.add('is-in'));return;} const io=new IntersectionObserver((es)=>{for(const e of es){if(e.isIntersecting){e.target.classList.add('is-in');io.unobserve(e.target);}}},{threshold:0.12,rootMargin:'0px 0px -50px 0px'}); els.forEach(el=>io.observe(el)); return ()=>io.disconnect(); },[]); }
  function App(){
    useScrollReveal();
    const d = window.MS_SUB[KEY];
    useEffect(()=>{
      const base="https://www.ict.com.qa";
      const svc = d.schema==="Product"
        ? {"@context":"https://schema.org","@type":"Product","name":d.crumb,"description":"Why choose ICT on Microsoft: Solutions Partner designations, Microsoft AI Cloud Partner Program membership, and verified credentials.","brand":{"@type":"Brand","name":"ICT"},"category":"Enterprise software","url":base+d.url}
        : {"@context":"https://schema.org","@type":"Service","serviceType":d.crumb,"provider":{"@type":"Organization","name":"ICT W.L.L","url":base+"/"},"areaServed":{"@type":"Country","name":"Qatar"},"description":"Why choose ICT on Microsoft: Solutions Partner designations, Microsoft AI Cloud Partner Program membership, and verified credentials.","url":base+d.url};
      const ld=[
        {"@context":"https://schema.org","@type":"WebPage","name":document.title,"url":base+d.url,"isPartOf":{"@type":"WebSite","name":"ICT","url":base+"/"}},
        {"@context":"https://schema.org","@type":"Organization","name":"ICT W.L.L","url":base+"/","logo":base+"/assets/ict-logo.png","areaServed":{"@type":"Country","name":"Qatar"}},
        {"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[
          {"@type":"ListItem","position":1,"name":"Home","item":base+"/"},
          {"@type":"ListItem","position":2,"name":"Partners","item":base+"/partners"},
          {"@type":"ListItem","position":3,"name":"Microsoft","item":base+"/partners/microsoft"},
          {"@type":"ListItem","position":4,"name":d.crumb,"item":base+d.url}
        ]},
        svc
      ];
      ld.forEach(o=>{const s=document.createElement('script');s.type='application/ld+json';s.textContent=JSON.stringify(o);document.head.appendChild(s);});
    },[]);
    return (<><Nav /><main id="main-content" tabIndex="-1"><MicrosoftSubPage data={d} /></main><Footer /></>);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
